name: Build
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Windows
          - os: macos-latest
            artifact: macOS
          - os: ubuntu-latest
            artifact: Linux
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install libusb (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest https://github.com/libusb/libusb/releases/download/v1.0.27/libusb-1.0.27.7z -OutFile libusb.7z
        7z x libusb.7z -olibusb
        Copy-Item libusb\VS2022\MS64\dll\libusb-1.0.dll .
        echo $env:GITHUB_WORKSPACE | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install libusb (macOS)
      if: runner.os == 'macOS'
      run: brew install libusb

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev libgirepository1.0-dev gir1.2-webkit2-4.1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build
      run: |
        python -OO -m PyInstaller pmca-console.spec
        python -OO -m PyInstaller pmca-web.spec

    - name: Test
      run: |
        dist/pmca-console* -h

    - name: Upload
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.artifact }}
        path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: artifacts

    - name: Create release and upload artifacts
      run: |
        find artifacts -type f | xargs gh release create ${{ github.ref_name }} --generate-notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

